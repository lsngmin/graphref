services:
  api:
    build:
      context: .
      dockerfile: apps/Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE: jobs
      JOB_TIMEOUT: ${JOB_TIMEOUT:-1800}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_SCHEMA: ${SUPABASE_SCHEMA:-public}
      LEMON_SQUEEZY_WEBHOOK_SECRET: ${LEMON_SQUEEZY_WEBHOOK_SECRET:-}
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/Dockerfile
    command: ["python", "worker.py"]
    init: true
    shm_size: "1g"
    environment:
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE: jobs
      JOB_TIMEOUT: ${JOB_TIMEOUT:-1800}
      PYTHONUNBUFFERED: "1"
      USE_XVFB: "1"
      CAPSOLVER_API_KEY: ${CAPSOLVER_API_KEY:-}
    depends_on:
      - redis

  bot:
    build:
      context: .
      dockerfile: apps/Dockerfile
    command: ["python", "telegram_bot.py"]
    init: true
    environment:
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE: jobs
      JOB_TIMEOUT: ${JOB_TIMEOUT:-1800}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-graphrefbot}
      BOT_POLL_TIMEOUT: ${BOT_POLL_TIMEOUT:-20}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_SCHEMA: ${SUPABASE_SCHEMA:-public}
      LEMON_SQUEEZY_API_KEY: ${LEMON_SQUEEZY_API_KEY:-}
      LEMON_SQUEEZY_STORE_ID: ${LEMON_SQUEEZY_STORE_ID:-}
      LEMON_SQUEEZY_TEST_MODE: ${LEMON_SQUEEZY_TEST_MODE:-false}
      LEMON_SQUEEZY_REDIRECT_URL: ${LEMON_SQUEEZY_REDIRECT_URL:-}
      LEMON_SQUEEZY_VARIANT_STARTER: ${LEMON_SQUEEZY_VARIANT_STARTER:-}
      LEMON_SQUEEZY_VARIANT_BASIC: ${LEMON_SQUEEZY_VARIANT_BASIC:-}
      LEMON_SQUEEZY_VARIANT_PRO: ${LEMON_SQUEEZY_VARIANT_PRO:-}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
